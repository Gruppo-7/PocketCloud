events {}

http {

    client_max_body_size
        500M;

    client_body_timeout
        300s;

    client_header_timeout
        60s;

    send_timeout
        300s;

    proxy_connect_timeout
        60s;

    proxy_send_timeout
        300s;

    proxy_read_timeout
        300s;

    server {

        listen 80;

        access_log off;

        location / {

            proxy_pass
                http://server:3000;

            proxy_http_version
                1.1;

            proxy_set_header
                Host $host;

            proxy_set_header
                X-Real-IP $remote_addr;

            proxy_set_header
                X-Forwarded-For
                $proxy_add_x_forwarded_for;

            proxy_set_header
                X-Forwarded-Proto
                $scheme;

            proxy_set_header
                X-Forwarded-Host
                $host;

            proxy_set_header
                X-Forwarded-Port
                $server_port;
        }
    }
}