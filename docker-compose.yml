services:

  postgres:

    image: postgres:17-alpine

    container_name:
      pocketcloud-postgres

    restart:
      unless-stopped

    env_file:
      - ./server/.env

    environment:
      POSTGRES_USER:
        ${DB_USER}

      POSTGRES_PASSWORD:
        ${DB_PASSWORD}

      POSTGRES_DB:
        ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U PocketCloud_User -d PocketCloud"
        ]

      interval: 5s
      timeout: 5s
      retries: 5

  server:

    build:
      ./server

    container_name:
      pocketcloud-server

    restart:
      unless-stopped

    env_file:
      - ./server/.env

    depends_on:

      postgres:
        condition:
          service_healthy
    
    volumes:
      - uploads_data:/app/storage
  
  nginx:

    image:
      nginx:alpine

    container_name:
      pocketcloud-nginx

    restart:
      unless-stopped

    ports:
      - "80:80"

    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:

      server:
        condition:
          service_started

volumes:

  postgres_data:
  uploads_data: