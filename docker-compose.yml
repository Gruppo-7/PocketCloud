services:

  postgres:

    image: postgres:17-alpine

    container_name:
      pocketcloud-postgres

    restart:
      unless-stopped

    environment:
      POSTGRES_USER:
        PocketCloud_User

      POSTGRES_PASSWORD:
        12345

      POSTGRES_DB:
        PocketCloud

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  server:

    build:
      ./server

    container_name:
      pocketcloud-server

    restart:
      unless-stopped

    ports:
      - "3000:3000"

    env_file:
      - ./server/.env

    depends_on:
      - postgres

volumes:

  postgres_data: